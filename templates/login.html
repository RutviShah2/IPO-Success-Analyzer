<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login – IPO Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
{% include "navbar.html" %}

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">📈</div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Login to access the IPO Predictor</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login" autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required/>
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn-predict" style="margin-top:22px;">Login</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="/signup">Sign up</a></p>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
